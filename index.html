<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class = "header-left">
            <h2>好きなポケモン</h2>
        </div>
        <div class = "header-right">
            <a href="#">ホーム</a>
            <a href="list.html">ポケモン記事</a>
        </div>
    </header>
    <div class = "top-wrapper">
        <h1>自分の相棒ポケモン</h1>
    </div>
    <div class = "container">
        <div class = "main-wrapper">
            <h2 class = "name-title">かわいいポケモンたち</h2>
            <div class = "pokemon">
                <img src="honmonopurin.png">
                <div class = "pokemon-right">
                    <p class = "pokemon-title">プリン</p>
                    <p class = "pokemon-text">かわいい。昔から大好きなポケモン。まんまる。</p>
                </div>
            </div>
            <div class = "pokemon">
                <img src="irotigairingo.png">
                <div class = "pokemon-right">
                    <p class = "pokemon-title">アップリュー</p>
                    <p class = "pokemon-text">かわいい。剣盾から出会い、svでさらに大好きになった。目が好き。</p>
                </div>
            </div>
            <div class = "pokemon">
                <img src="honmonohennjin.png">
                <div class = "pokemon-right">
                    <p class = "pokemon-title">イシヘンジン</p>
                    <p class = "pokemon-text">かわいい。剣盾で出会った。顔と足が特徴的で好き。</p>
                </div>
            </div>
            <div class = "pokemon">
                <img src="nuigurumi.png">
                <div class = "pokemon-right">
                    <p class = "pokemon-title">ジュペッタ</p>
                    <p class = "pokemon-text">かわいい。初めての色違い。にっこり笑顔がとても良い。</p>
                </div>
            </div>
            <div class = "pokemon">
                <img src="iakaripon.png">
                <div class = "pokemon-right">
                    <p class = "pokemon-title">オーガポン</p>
                    <p class = "pokemon-text">かわいい。svでの冒険、対戦と頼りになったポケモン。お面も好き。</p>
                </div>
            </div>
        </div>
        <div class = "side-menu">
            <div class = "profile-card">
                <h2 class = "name-title">管理人</h2>
                <img src="jibunpurin.png">
                <h3>イケダ</h3>
                <p>ポケモンが好きです。日々癒されています。</p>
            </div>
            <div class = "profile-card">
                <h2 class = "name-title">カテゴリ</h2>
                <ul class = "category-list">
                    <li><a href="buddy.html"># 相棒</a></li>
                    <li><a href="batle.html"># 対戦</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
